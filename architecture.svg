<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5eff8f"/>
    </marker>
  </defs>

  <rect width="900" height="380" fill="#0a0e0d"/>

  <!-- WhatsApp user -->
  <rect x="30" y="160" width="140" height="60" rx="6" fill="#101513" stroke="#1f2825" stroke-width="1"/>
  <text x="100" y="185" fill="#e8ece9" font-family="JetBrains Mono, monospace" font-size="13" text-anchor="middle">Cliente final</text>
  <text x="100" y="203" fill="#8a9590" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">WhatsApp</text>

  <!-- Meta Cloud API -->
  <rect x="220" y="160" width="150" height="60" rx="6" fill="#101513" stroke="#1f2825" stroke-width="1"/>
  <text x="295" y="185" fill="#e8ece9" font-family="JetBrains Mono, monospace" font-size="13" text-anchor="middle">Meta Cloud API</text>
  <text x="295" y="203" fill="#8a9590" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">webhook entrante</text>

  <!-- Backend -->
  <rect x="420" y="140" width="170" height="100" rx="6" fill="#101513" stroke="#5eff8f" stroke-width="1.5"/>
  <text x="505" y="170" fill="#5eff8f" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" text-anchor="middle">Backend</text>
  <text x="505" y="190" fill="#8a9590" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">Node.js + Fastify</text>
  <text x="505" y="206" fill="#8a9590" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">routing multi-tenant</text>
  <text x="505" y="222" fill="#8a9590" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">lógica de negocio</text>

  <!-- Claude API -->
  <rect x="650" y="60" width="170" height="60" rx="6" fill="#101513" stroke="#1f2825" stroke-width="1"/>
  <text x="735" y="85" fill="#e8ece9" font-family="JetBrains Mono, monospace" font-size="13" text-anchor="middle">Claude API</text>
  <text x="735" y="103" fill="#8a9590" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">generación de respuestas</text>

  <!-- Supabase -->
  <rect x="650" y="240" width="170" height="80" rx="6" fill="#101513" stroke="#1f2825" stroke-width="1"/>
  <text x="735" y="265" fill="#e8ece9" font-family="JetBrains Mono, monospace" font-size="13" text-anchor="middle">Supabase</text>
  <text x="735" y="283" fill="#8a9590" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">PostgreSQL</text>
  <text x="735" y="299" fill="#8a9590" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">datos por tenant</text>

  <!-- Arrows -->
  <line x1="170" y1="190" x2="218" y2="190" stroke="#5eff8f" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="190" x2="418" y2="190" stroke="#5eff8f" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="170" x2="648" y2="110" stroke="#5eff8f" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="648" y1="95" x2="592" y2="160" stroke="#3a4540" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="590" y1="210" x2="648" y2="265" stroke="#5eff8f" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="648" y1="280" x2="592" y2="220" stroke="#3a4540" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Labels on arrows -->
  <text x="475" y="245" fill="#4d5753" font-family="JetBrains Mono, monospace" font-size="10">respuesta generada</text>
  <text x="475" y="135" fill="#4d5753" font-family="JetBrains Mono, monospace" font-size="10">prompt + contexto</text>

  <!-- Caption -->
  <text x="450" y="350" fill="#4d5753" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">flujo simplificado · arquitectura multi-tenant</text>
</svg>
